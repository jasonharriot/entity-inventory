<!DOCTYPE html>

<html>
	<head>
		<link rel="stylesheet" href="style/style.css" />
		<link rel="stylesheet" href="style/issue.css" />

		<meta name="viewport" content="width=device-width,initial-scale=1.0">

		<title>Log in</title>
	</head>
	<body>
		<div id="container">
			<div id="header" class="section">
				<div>
					<div>
						<h1>Entity Inventory</h1>
					</div>
					<div>
						<h2>
							<a class="backArrow" href=".">
								<img src="img/arrow-left.png">
								Home
							</a>
						</h2>
					</div>
				</div>
			</div>

			<div id="contentContainer">
				<div class="section">
					<h2>Log in to Entity Inventory</h2>
					<div id="fillMessage" display="none"></div>
					<form action="/api/login" method="post">
						<p>
							<input type="email" name="email" placeholder="e-mail address">
						</p>
						<p>
							<input type="password" name="password" placeholder="password">
						</p>
						<p>
							<input type="submit" value="Submit">
						</p>
					</form>
				</div>
			</div>

			<div id="footer" class="section">
				<p>
					EDAC Labs, Inc.
				</p>
			</div>

			<script type="text/javascript" src="js/func-url-message.js"></script>
		</div>
	</body>
</html>
